name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true
          claude_args: '--dangerouslySkipPermissions'
          prompt: |
            Review this pull request. Use `git diff origin/main...HEAD` to see the changes.
            Analyze the diff for bugs, logic errors, edge cases, security issues, and performance concerns.
            Post your review using `gh pr review ${{ github.event.pull_request.number }} --comment --body "<your review>"`.
